<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星星银行</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg1: #fef6ff;
    --bg2: #eef7ff;
    --card: #ffffff;
    --accent: #ff8fab;
    --accent2: #ffd166;
    --green: #06d6a0;
    --blue: #4cc9f0;
    --purple: #b794f6;
    --text: #4a4a6a;
    --shadow: 0 8px 24px rgba(120,110,160,.15);
  }
  body {
    font-family: "Comic Sans MS", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    background: linear-gradient(160deg, var(--bg1), var(--bg2));
    color: var(--text);
    min-height: 100vh;
    padding: 16px;
    overflow-x: hidden;
  }
  .wrap { max-width: 720px; margin: 0 auto; }

  /* 顶部栏 */
  .score-card {
    background: linear-gradient(135deg, #8aa7ff, #b79cf2);
    border-radius: 28px;
    padding: 20px;
    color: #fff;
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
    margin-bottom: 18px;
  }
  .header-row {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  .header-left {
    display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0;
  }
  .avatar {
    width: 52px; height: 52px; border-radius: 50%; flex-shrink: 0;
    background: rgba(255,255,255,.3);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.85rem;
    border: 2px solid rgba(255,255,255,.5);
    box-shadow: 0 4px 12px rgba(0,0,0,.1);
    cursor: pointer;
    transition: transform .15s;
  }
  .avatar:active { transform: scale(.92); }
  .welcome { cursor: pointer; min-width: 0; }
  .welcome:active { opacity: .85; }
  .welcome .greet {
    font-size: 1.05rem; font-weight: 800;
    text-shadow: 0 2px 4px rgba(0,0,0,.12);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .welcome .sub { font-size: .78rem; opacity: .88; margin-top: 3px; }
  .star-badge {
    display: flex; align-items: center; gap: 5px; flex-shrink: 0;
    background: rgba(255,255,255,.28);
    padding: 8px 14px; border-radius: 999px;
    backdrop-filter: blur(4px);
    transition: transform .25s;
  }
  .star-badge.bump { transform: scale(1.15); }
  .star-badge .star-icon { font-size: 1.35rem; line-height: 1; }
  .star-badge .score-num { font-size: 1.55rem; font-weight: 900; line-height: 1; }
  .env-badge {
    position: absolute; bottom: 8px; right: 12px;
    font-size: .58rem; padding: 2px 7px; border-radius: 999px;
    background: rgba(255,255,255,.18); color: rgba(255,255,255,.75);
    font-weight: 600;
  }
  .env-badge.dev { background: rgba(255,240,168,.28); color: rgba(255,248,220,.9); }

  /* 标签切换 */
  .tabs { display: flex; gap: 10px; margin-bottom: 16px; }
  .tab {
    flex: 1; padding: 14px; border: none; border-radius: 18px;
    font-size: 1.05rem; font-weight: 700; cursor: pointer;
    background: #fff; color: var(--text); box-shadow: var(--shadow);
    transition: transform .15s, background .2s;
    font-family: inherit;
  }
  .tab:active { transform: scale(.95); }
  .tab.active { color: #fff; }
  .tab.active.earn { background: linear-gradient(135deg, var(--green), #4cc9f0); }
  .tab.active.spend { background: linear-gradient(135deg, var(--accent2), var(--accent)); }

  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 480px) { .grid { gap: 10px; } }

  .item {
    background: var(--card); border-radius: 22px; padding: 16px 12px;
    text-align: center; box-shadow: var(--shadow); cursor: pointer;
    transition: transform .12s; position: relative; user-select: none;
    border: 3px solid transparent;
  }
  .item:active { transform: scale(.93); }
  .item .emoji { font-size: 2.6rem; display: block; margin-bottom: 6px; }
  .item .name { font-size: 1.05rem; font-weight: 700; margin-bottom: 6px; }
  .item .pts {
    display: inline-block; padding: 4px 14px; border-radius: 999px;
    font-size: .95rem; font-weight: 800; color: #fff;
  }
  .earn-item .pts { background: var(--green); }
  .spend-item .pts { background: var(--accent); }
  .item .count {
    position: absolute; top: 8px; right: 8px;
    background: var(--purple); color: #fff; font-size: .75rem; font-weight: 700;
    min-width: 22px; height: 22px; border-radius: 999px;
    display: flex; align-items: center; justify-content: center; padding: 0 6px;
  }
  .spend-item.locked { opacity: .45; filter: grayscale(.6); }

  /* 历史记录 */
  .section-title { font-size: 1.1rem; font-weight: 800; margin: 24px 0 12px; display: flex; align-items: center; gap: 8px; }
  .history { background: var(--card); border-radius: 22px; box-shadow: var(--shadow); padding: 8px; }
  .log {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 12px; border-radius: 14px;
  }
  .log:nth-child(odd) { background: #faf7ff; }
  .log .left { display: flex; align-items: center; gap: 10px; font-size: .95rem; }
  .log .le { font-size: 1.4rem; }
  .log .time { font-size: .72rem; color: #aaa; }
  .log .delta { font-weight: 800; font-size: 1rem; }
  .log .delta.plus { color: var(--green); }
  .log .delta.minus { color: var(--accent); }
  .empty { text-align: center; color: #bbb; padding: 24px; }

  .toolbar { display: flex; gap: 10px; margin-top: 14px; }
  .btn-soft {
    flex: 1; padding: 12px; border: none; border-radius: 16px; cursor: pointer;
    background: #fff; color: var(--text); font-weight: 700; font-family: inherit;
    box-shadow: var(--shadow); font-size: .9rem;
  }
  .btn-soft:active { transform: scale(.96); }

  /* 飘出的积分提示 */
  .pop {
    position: fixed; left: 50%; top: 30%; transform: translateX(-50%);
    font-size: 3rem; font-weight: 900; pointer-events: none; z-index: 50;
    animation: popUp 1s ease-out forwards;
  }
  @keyframes popUp {
    0% { opacity: 0; transform: translateX(-50%) scale(.4); }
    25% { opacity: 1; transform: translateX(-50%) scale(1.3) translateY(-10px); }
    100% { opacity: 0; transform: translateX(-50%) scale(1) translateY(-90px); }
  }
  .confetti {
    position: fixed; width: 12px; height: 12px; z-index: 49; pointer-events: none;
    border-radius: 3px; top: -20px;
  }
  @keyframes fall {
    to { transform: translateY(105vh) rotate(720deg); opacity: 0; }
  }
  footer { text-align: center; color: #c5c0d8; font-size: .8rem; margin: 20px 0 8px; }

  /* 确认弹窗 */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(74, 74, 106, .45);
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    opacity: 0; visibility: hidden;
    transition: opacity .2s, visibility .2s;
  }
  .modal-overlay.show { opacity: 1; visibility: visible; }
  .modal-box {
    background: #fff; border-radius: 28px; padding: 28px 24px;
    max-width: 340px; width: 100%; text-align: center;
    box-shadow: 0 16px 48px rgba(120,110,160,.25);
    transform: scale(.9); transition: transform .2s;
  }
  .modal-overlay.show .modal-box { transform: scale(1); }
  .modal-emoji { font-size: 3rem; margin-bottom: 12px; }
  .modal-title { font-size: 1.15rem; font-weight: 800; margin-bottom: 10px; }
  .modal-msg { font-size: .95rem; color: #888; line-height: 1.5; margin-bottom: 8px; }
  .modal-step {
    font-size: .78rem; color: var(--purple); font-weight: 700;
    margin-bottom: 20px;
  }
  .modal-btns { display: flex; gap: 10px; }
  .modal-btn {
    flex: 1; padding: 14px; border: none; border-radius: 16px;
    font-size: .95rem; font-weight: 700; cursor: pointer; font-family: inherit;
    transition: transform .12s;
  }
  .modal-btn:active { transform: scale(.96); }
  .modal-btn.cancel { background: #f0ecff; color: var(--text); }
  .modal-btn.confirm { background: linear-gradient(135deg, var(--accent2), var(--accent)); color: #fff; }
  .modal-btn.danger { background: linear-gradient(135deg, #ff6b8a, #e63956); color: #fff; }

  .profile-input {
    width: 100%; padding: 12px 14px; border: 2px solid #ece6ff;
    border-radius: 14px; font-size: 1rem; font-family: inherit;
    color: var(--text); margin-bottom: 14px; outline: none;
    text-align: center; font-weight: 700;
  }
  .profile-input:focus { border-color: var(--purple); }
  .emoji-picker {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
    margin-bottom: 20px;
  }
  .emoji-opt {
    aspect-ratio: 1; border: 2px solid #ece6ff; border-radius: 14px;
    background: #faf7ff; font-size: 1.6rem; cursor: pointer;
    font-family: inherit; transition: transform .12s, border-color .12s;
  }
  .emoji-opt:active { transform: scale(.92); }
  .emoji-opt.selected {
    border-color: var(--purple); background: #f0ecff;
    box-shadow: 0 0 0 2px rgba(183,148,246,.35);
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="score-card">
    <div class="header-row">
      <div class="header-left">
        <div class="avatar" id="avatar" onclick="openProfileModal()" title="点击修改头像">👧</div>
        <div class="welcome" onclick="openProfileModal()" title="点击修改昵称">
          <div class="greet" id="welcomeGreet">你好，宝贝！</div>
          <div class="sub" id="welcomeSub">星星银行 · 点击可修改头像和昵称</div>
        </div>
      </div>
      <div class="star-badge" id="starBadge">
        <span class="star-icon">⭐</span>
        <span class="score-num" id="scoreNum">0</span>
      </div>
    </div>
    <div class="env-badge" id="envBadge"></div>
  </div>

  <div class="tabs">
    <button class="tab earn active" id="tabEarn" onclick="switchTab('earn')">💪 做任务赚积分</button>
    <button class="tab spend" id="tabSpend" onclick="switchTab('spend')">🎁 换奖励花积分</button>
  </div>

  <div class="grid" id="grid"></div>

  <div class="section-title">📜 积分记录</div>
  <div class="history" id="history"></div>

  <div class="toolbar">
    <button class="btn-soft" onclick="undoLast()">↩️ 撤销上一条</button>
    <button class="btn-soft" onclick="clearAll()">🧹 全部清空</button>
  </div>

  <footer>陪宝贝一起成长 💛</footer>
</div>

<div class="modal-overlay" id="profileModal" onclick="if(event.target===this) hideProfileModal()">
  <div class="modal-box">
    <div class="modal-title">修改宝贝信息</div>
    <input class="profile-input" id="profileNameInput" type="text" maxlength="12" placeholder="宝贝昵称" onkeydown="if(event.key==='Enter')saveProfile()">
    <div class="emoji-picker" id="emojiPicker"></div>
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="hideProfileModal()">取消</button>
      <button class="modal-btn confirm" onclick="saveProfile()">保存</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="clearModal" onclick="if(event.target===this) hideClearModal()">
  <div class="modal-box">
    <div class="modal-emoji" id="clearModalEmoji">🧹</div>
    <div class="modal-title" id="clearModalTitle">确定要清空吗？</div>
    <div class="modal-msg" id="clearModalMsg">将清空当前所有积分和记录。</div>
    <div class="modal-step" id="clearModalStep">第 1 步 / 共 2 步</div>
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="hideClearModal()">取消</button>
      <button class="modal-btn confirm" id="clearModalOk" onclick="onClearConfirm()">确定清空</button>
    </div>
  </div>
</div>

<!-- Firebase 云同步 SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
  // ====== 宝贝信息默认值（首次使用或未设置时） ======
  const DEFAULT_CHILD_NAME = '宝贝';
  const DEFAULT_CHILD_AVATAR = '👧';
  // 头像：0-12 岁男孩女孩 + 十二生肖
  const AVATAR_OPTIONS = [
    '👶', '👦', '👧', '🧒',
    '🐭', '🐮', '🐯', '🐰', '🐲', '🐍', '🐴', '🐑', '🐵', '🐔', '🐶', '🐷'
  ];
  let profilePickAvatar = DEFAULT_CHILD_AVATAR;

  function defaultProfile() {
    return { name: DEFAULT_CHILD_NAME, avatar: DEFAULT_CHILD_AVATAR };
  }

  function normalizeProfile(p) {
    if (p && typeof p.name === 'string' && p.name.trim()) {
      return {
        name: p.name.trim().slice(0, 12),
        avatar: AVATAR_OPTIONS.includes(p.avatar) ? p.avatar : DEFAULT_CHILD_AVATAR
      };
    }
    return defaultProfile();
  }

  // ====== 可自由修改的任务和奖励 ======
  const TASKS = [
    { id: 'wash',    emoji: '🧼', name: '自己洗手',   pts: 2 },
    { id: 'eat',     emoji: '🍚', name: '自己吃饭',   pts: 5 },
    { id: 'veggie',  emoji: '🥬', name: '吃蔬菜',     pts: 4 },
    { id: 'brush',   emoji: '🪥', name: '认真刷牙',   pts: 3 },
    { id: 'dress',   emoji: '👕', name: '自己穿衣服', pts: 5 },
    { id: 'shoes',   emoji: '👟', name: '自己穿鞋',   pts: 3 },
    { id: 'tidy',    emoji: '🧸', name: '收拾玩具',   pts: 4 },
    { id: 'sleep',   emoji: '😴', name: '乖乖睡觉',   pts: 4 },
    { id: 'jump',    emoji: '🤽', name: '勇敢跳水',   pts: 10 },
    { id: 'dive',    emoji: '🌊', name: '勇敢潜水',   pts: 10 },
  ];
  const REWARDS = [
    { id: 'cartoon', emoji: '📺', name: '看动画片15分钟', pts: 10 },
    { id: 'snack',   emoji: '🍪', name: '小零食一份',     pts: 8 },
    { id: 'icecream',emoji: '🍦', name: '冰淇淋一个',     pts: 15 },
    { id: 'toy',     emoji: '🚗', name: '小玩具一个',     pts: 30 },
    { id: 'park',    emoji: '🎡', name: '去游乐场玩',     pts: 50 },
  ];

  // ====== 环境隔离：本地开发 vs 线上真实 ======
  // localhost / 127.0.0.1 / 直接打开本地文件 → 开发环境
  // 部署到 GitHub Pages 等线上域名 → 线上环境
  const IS_LOCAL = ['localhost', '127.0.0.1'].includes(location.hostname)
    || location.protocol === 'file:';
  const ENV = IS_LOCAL ? 'dev' : 'prod';

  // 线上 Firebase 配置（真实积分，勿在本地乱测时可忽略此项）
  const firebaseConfigProd = {
    apiKey: "AIzaSyBSfzrKexHnCDOQ3k8vTSJ8oGqRtlh95tk",
    authDomain: "baby-points-9a82c.firebaseapp.com",
    databaseURL: "https://baby-points-9a82c-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "baby-points-9a82c",
    storageBucket: "baby-points-9a82c.firebasestorage.app",
    messagingSenderId: "524651272617",
    appId: "1:524651272617:web:b827922fafbc5e083c4cb8"
  };
  // 开发 Firebase 配置（可选：创建独立 dev 项目后粘贴；留空则复用线上项目但走独立数据路径）
  const firebaseConfigDev = {
    apiKey: "",
    authDomain: "",
    databaseURL: "",
    projectId: "",
    storageBucket: "",
    messagingSenderId: "",
    appId: ""
  };

  const firebaseConfig = (ENV === 'dev' && firebaseConfigDev.databaseURL)
    ? firebaseConfigDev
    : firebaseConfigProd;

  // 家庭代号：dev / prod 各一份，互不影响
  const FAMILY = ENV === 'dev' ? 'mybaby-dev' : 'mybaby';

  // ====== 数据存储 ======
  const KEY = 'kid_points_data_v1_' + ENV;
  let state = loadLocal();
  let cloudRef = null;
  let applyingRemote = false;

  function loadLocal() {
    try {
      const d = JSON.parse(localStorage.getItem(KEY));
      if (d && typeof d.score === 'number') {
        if (!Array.isArray(d.history)) d.history = [];
        d.profile = normalizeProfile(d.profile);
        return d;
      }
    } catch(e){}
    return { score: 0, history: [], profile: defaultProfile() };
  }
  function saveLocal() { localStorage.setItem(KEY, JSON.stringify(state)); }

  function save() {
    saveLocal();
    if (cloudRef && !applyingRemote) {
      cloudRef.set(state).catch(err => console.warn('云同步写入失败', err));
    }
  }

  function welcomeText() {
    const name = state.profile.name;
    const h = new Date().getHours();
    if (h < 12) return '早上好，' + name + '！';
    if (h < 18) return '下午好，' + name + '！';
    return '晚上好，' + name + '！';
  }

  function renderHeader() {
    document.getElementById('scoreNum').textContent = state.score;
    document.getElementById('welcomeGreet').textContent = welcomeText();
    document.getElementById('avatar').textContent = state.profile.avatar;
  }

  function renderEmojiPicker() {
    const grid = document.getElementById('emojiPicker');
    grid.innerHTML = '';
    AVATAR_OPTIONS.forEach(em => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'emoji-opt' + (em === profilePickAvatar ? ' selected' : '');
      btn.textContent = em;
      btn.onclick = () => { profilePickAvatar = em; renderEmojiPicker(); };
      grid.appendChild(btn);
    });
  }

  function openProfileModal() {
    profilePickAvatar = state.profile.avatar;
    document.getElementById('profileNameInput').value = state.profile.name;
    renderEmojiPicker();
    document.getElementById('profileModal').classList.add('show');
    setTimeout(() => document.getElementById('profileNameInput').focus(), 200);
  }

  function hideProfileModal() {
    document.getElementById('profileModal').classList.remove('show');
  }

  function saveProfile() {
    const name = document.getElementById('profileNameInput').value.trim();
    if (!name) {
      popup('请输入昵称', '#ff8fab', '✏️');
      return;
    }
    state.profile = { name: name.slice(0, 12), avatar: profilePickAvatar };
    save();
    renderHeader();
    hideProfileModal();
  }

  function setStatus(text, isDev) {
    const el = document.getElementById('envBadge');
    if (!el) return;
    el.textContent = text;
    el.classList.toggle('dev', !!isDev);
  }

  function envStatusText() {
    if (ENV === 'prod') return { text: '线上', dev: false };
    return { text: '开发', dev: true };
  }

  function initCloud() {
    if (!firebaseConfig.databaseURL) {
      const s = envStatusText();
      setStatus(s.text, s.dev);
      return;
    }
    try {
      firebase.initializeApp(firebaseConfig);
      cloudRef = firebase.database().ref('families/' + FAMILY);
      let first = true;
      cloudRef.on('value', snap => {
        const val = snap.val();
        if (val && typeof val.score === 'number') {
          state = {
            score: val.score,
            history: Array.isArray(val.history) ? val.history : [],
            profile: normalizeProfile(val.profile)
          };
          saveLocal();
          applyingRemote = true; render(); applyingRemote = false;
        } else if (first) {
          cloudRef.set(state); // 云端为空时，把本机数据作为初始上传
        }
        first = false;
        const s = envStatusText();
        setStatus(s.text, s.dev);
      }, err => { console.warn(err); setStatus('离线', ENV === 'dev'); });
    } catch(e) { console.warn(e); setStatus('离线', ENV === 'dev'); }
  }

  let currentTab = 'earn';

  function switchTab(t) {
    currentTab = t;
    document.getElementById('tabEarn').classList.toggle('active', t === 'earn');
    document.getElementById('tabSpend').classList.toggle('active', t === 'spend');
    render();
  }

  function countOf(id) {
    return state.history.filter(h => h.id === id).length;
  }

  function render() {
    renderHeader();
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    const list = currentTab === 'earn' ? TASKS : REWARDS;
    list.forEach(it => {
      const div = document.createElement('div');
      const c = countOf(it.id);
      if (currentTab === 'earn') {
        div.className = 'item earn-item';
        div.innerHTML = `
          ${c ? `<span class="count">${c}</span>` : ''}
          <span class="emoji">${it.emoji}</span>
          <span class="name">${it.name}</span>
          <span class="pts">+${it.pts}</span>`;
        div.onclick = (e) => earn(it, e);
      } else {
        const locked = state.score < it.pts;
        div.className = 'item spend-item' + (locked ? ' locked' : '');
        div.innerHTML = `
          ${c ? `<span class="count">${c}</span>` : ''}
          <span class="emoji">${it.emoji}</span>
          <span class="name">${it.name}</span>
          <span class="pts">-${it.pts}</span>`;
        div.onclick = (e) => spend(it, e, locked);
      }
      grid.appendChild(div);
    });
    renderHistory();
  }

  function renderHistory() {
    const h = document.getElementById('history');
    if (!state.history.length) {
      h.innerHTML = '<div class="empty">还没有记录，快去做任务赚积分吧！🚀</div>';
      return;
    }
    h.innerHTML = '';
    state.history.slice().reverse().slice(0, 30).forEach(log => {
      const row = document.createElement('div');
      row.className = 'log';
      const plus = log.delta > 0;
      row.innerHTML = `
        <div class="left">
          <span class="le">${log.emoji}</span>
          <div>
            <div>${log.name}</div>
            <div class="time">${log.time}</div>
          </div>
        </div>
        <div class="delta ${plus ? 'plus' : 'minus'}">${plus ? '+' : ''}${log.delta}</div>`;
      h.appendChild(row);
    });
  }

  function nowStr() {
    const d = new Date();
    const p = n => String(n).padStart(2, '0');
    return `${d.getMonth()+1}月${d.getDate()}日 ${p(d.getHours())}:${p(d.getMinutes())}`;
  }

  function earn(it, e) {
    state.score += it.pts;
    state.history.push({ id: it.id, emoji: it.emoji, name: it.name, delta: it.pts, time: nowStr() });
    save();
    bump(); popup('+' + it.pts, '#06d6a0', it.emoji); confetti();
    render();
  }

  function spend(it, e, locked) {
    if (locked) {
      popup('积分不够哦', '#ff8fab', '😅');
      shakeScore();
      return;
    }
    state.score -= it.pts;
    state.history.push({ id: it.id, emoji: it.emoji, name: it.name, delta: -it.pts, time: nowStr() });
    save();
    bump(); popup('-' + it.pts, '#ff8fab', it.emoji);
    render();
  }

  function undoLast() {
    if (!state.history.length) return;
    const last = state.history.pop();
    state.score -= last.delta;
    save();
    render();
  }

  let clearConfirmStep = 1;

  const CLEAR_STEPS = [
    {
      emoji: '🧹',
      title: '确定要清空吗？',
      msg: '将清空当前所有积分和记录。',
      step: '第 1 步 / 共 2 步',
      btn: '继续',
      danger: false
    },
    {
      emoji: '⚠️',
      title: '再次确认清空',
      msg: '清空后无法恢复，真的要全部清空吗？',
      step: '第 2 步 / 共 2 步',
      btn: '确认全部清空',
      danger: true
    }
  ];

  function showClearModalStep(step) {
    clearConfirmStep = step;
    const s = CLEAR_STEPS[step - 1];
    document.getElementById('clearModalEmoji').textContent = s.emoji;
    document.getElementById('clearModalTitle').textContent = s.title;
    document.getElementById('clearModalMsg').textContent = s.msg;
    document.getElementById('clearModalStep').textContent = s.step;
    const okBtn = document.getElementById('clearModalOk');
    okBtn.textContent = s.btn;
    okBtn.className = 'modal-btn ' + (s.danger ? 'danger' : 'confirm');
    document.getElementById('clearModal').classList.add('show');
  }

  function hideClearModal() {
    document.getElementById('clearModal').classList.remove('show');
    clearConfirmStep = 1;
  }

  function clearAll() {
    if (!state.score && !state.history.length) return;
    showClearModalStep(1);
  }

  function onClearConfirm() {
    if (clearConfirmStep === 1) {
      showClearModalStep(2);
      return;
    }
    state = { score: 0, history: [], profile: state.profile };
    save();
    render();
    hideClearModal();
  }

  // ====== 动画效果 ======
  function bump() {
    const el = document.getElementById('starBadge');
    el.classList.remove('bump'); void el.offsetWidth; el.classList.add('bump');
    setTimeout(() => el.classList.remove('bump'), 300);
  }
  function shakeScore() {
    const el = document.getElementById('starBadge');
    el.animate([{transform:'scale(1)'},{transform:'scale(1.1) translateX(-4px)'},{transform:'scale(1.1) translateX(4px)'},{transform:'scale(1)'}],{duration:300});
  }
  function popup(text, color, emoji) {
    const p = document.createElement('div');
    p.className = 'pop';
    p.style.color = color;
    p.textContent = (emoji || '') + ' ' + text;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 1000);
  }
  function confetti() {
    const colors = ['#ff8fab','#ffd166','#06d6a0','#4cc9f0','#b794f6'];
    for (let i = 0; i < 24; i++) {
      const c = document.createElement('div');
      c.className = 'confetti';
      c.style.left = Math.random()*100 + 'vw';
      c.style.background = colors[Math.floor(Math.random()*colors.length)];
      const dur = 1.2 + Math.random()*1;
      c.style.animation = `fall ${dur}s linear forwards`;
      c.style.transform = `rotate(${Math.random()*360}deg)`;
      document.body.appendChild(c);
      setTimeout(() => c.remove(), dur*1000 + 100);
    }
  }

  render();
  { const s = envStatusText(); setStatus(s.text, s.dev); }
  initCloud();
</script>
</body>
</html>
