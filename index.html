<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星星银行</title>
<link rel="icon" href="icons/star.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Noto+Sans+SC:wght@400..900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=0.0.45">
</head>
<body>
<div id="splashView" class="splash-view">
  <div class="splash-logo"><img class="splash-star" src="icons/star.svg" alt=""></div>
</div>
<div id="authView" class="auth-view" style="display:none">
  <div class="auth-card">
    <div class="auth-logo"><img class="auth-star" src="icons/star.svg" alt=""></div>
    <div class="auth-title">星星银行</div>

    <div id="authLoginPanel">
      <div class="auth-sub">请登录家长账号</div>
      <input class="profile-input auth-input" id="emailInput" type="email" autocomplete="username" placeholder="邮箱" onkeydown="if(event.key==='Enter')document.getElementById('passwordInput').focus()">
      <input class="profile-input auth-input auth-input-gap" id="passwordInput" type="password" autocomplete="current-password" placeholder="密码" onkeydown="if(event.key==='Enter')submitLogin()">
      <button class="auth-btn primary" id="loginBtn" onclick="submitLogin()">登录</button>
      <button type="button" class="auth-btn link" onclick="showForgotPanel()">忘记密码？</button>
    </div>

    <div id="authForgotSendPanel" style="display:none">
      <div class="auth-sub">输入注册邮箱，我们将发送验证码</div>
      <input class="profile-input auth-input" id="resetEmailInput" type="email" autocomplete="username" placeholder="邮箱" onkeydown="if(event.key==='Enter')submitForgotPassword()">
      <button class="auth-btn primary" id="forgotBtn" onclick="submitForgotPassword()">发送验证码</button>
      <button type="button" class="auth-btn link" onclick="showLoginPanel()">返回登录</button>
    </div>

    <div id="authResetPanel" style="display:none">
      <div class="auth-sub">请输入邮件验证码并设置新密码</div>
      <p class="auth-hint" id="resetEmailHint"></p>
      <input class="profile-input auth-input" id="resetCodeInput" type="text" inputmode="text" autocomplete="one-time-code" placeholder="邮件验证码" onkeydown="if(event.key==='Enter')document.getElementById('resetNewPasswordInput').focus()">
      <input class="profile-input auth-input auth-input-gap" id="resetNewPasswordInput" type="password" autocomplete="new-password" placeholder="新密码（至少 6 位）" onkeydown="if(event.key==='Enter')document.getElementById('resetConfirmPasswordInput').focus()">
      <input class="profile-input auth-input auth-input-gap" id="resetConfirmPasswordInput" type="password" autocomplete="new-password" placeholder="确认新密码" onkeydown="if(event.key==='Enter')submitResetPassword()">
      <button class="auth-btn primary" id="resetPasswordBtn" onclick="submitResetPassword()">确认重置密码</button>
      <button type="button" class="auth-btn link" onclick="showForgotSendPanel()">重新发送验证码</button>
      <button type="button" class="auth-btn link" onclick="showLoginPanel()">返回登录</button>
      <p class="auth-hint">点击邮件中的重置链接可自动跳回本页并填入验证码；也可复制链接里 <strong>oobCode=</strong> 后面的一串字符</p>
    </div>

    <div class="auth-error" id="authError" style="display:none"></div>
    <div class="auth-success" id="authSuccess" style="display:none"></div>
  </div>
</div>

<div id="appRoot" style="display:none">
<div class="wrap">
 <div id="mainView">
  <div class="score-card">
    <div class="header-row">
      <button type="button" class="header-left" onclick="switchView('settings')" title="我的">
        <span class="avatar" id="avatar">👧</span>
        <span class="welcome">
          <span class="greet-row">
            <span class="greet-name" id="welcomeName">宝贝</span>
            <span class="greet-arrow" aria-hidden="true">›</span>
          </span>
          <span class="sub" id="welcomeSub">早上好！</span>
        </span>
      </button>
      <div class="star-badge" id="starBadge">
        <span class="star-icon"><img class="ui-ic" src="icons/star.svg" alt=""></span>
        <span class="score-num" id="scoreNum">0</span>
      </div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab earn active" id="tabEarn" onclick="switchTab('earn')"><img class="ui-ic tab-ic" src="icons/muscle.svg" alt="">完成任务</button>
    <button class="tab spend" id="tabSpend" onclick="switchTab('spend')"><img class="ui-ic tab-ic" src="icons/gift.svg" alt="">兑换奖励</button>
  </div>

  <div class="sort-bar" id="sortBar">
    <button type="button" class="sort-toggle" onclick="toggleSortBar()">
      <span class="sort-label">排序</span>
      <span class="sort-current" id="sortCurrent">默认</span>
      <span class="sort-chevron">▼</span>
    </button>
    <div class="sort-options" id="sortOptions">
      <button type="button" class="filter-pill sort-pill" data-sort="default" onclick="setTaskSort('default')">默认</button>
      <button type="button" class="filter-pill sort-pill" data-sort="pts-asc" onclick="setTaskSort('pts-asc')">分数从低到高</button>
      <button type="button" class="filter-pill sort-pill" data-sort="pts-desc" onclick="setTaskSort('pts-desc')">分数从高到低</button>
    </div>
  </div>

  <div class="grid" id="grid"></div>

  <footer>陪宝贝一起成长</footer>
 </div>

 <div id="historyView" style="display:none">
  <div class="subpage-head">
    <button type="button" class="back-btn" onclick="switchView('settings')">‹ 返回</button>
    <div class="subpage-title">记录</div>
  </div>
  <div class="hp-datebar">
    <div class="hp-date-main">
      <div class="hp-date-title" id="hpDateTitle">今天</div>
      <div class="hp-date-stats" id="hpDateStats"></div>
    </div>
    <div class="hp-date-actions">
      <button class="filter-pill" id="allToggle" onclick="toggleAllFilter()">全部</button>
      <button class="cal-btn cal-btn-sm" id="hpCalBtn" onclick="openCalendar()" title="选择其它日期"><img class="ui-ic" src="icons/calendar.svg" alt=""></button>
      <button class="filter-pill filter-today" id="todayBtn" onclick="goToToday()" style="display:none">今天</button>
      <button class="filter-pill" id="historyEditBtn" onclick="enterHistoryEdit()">编辑</button>
      <button class="filter-pill" id="historyCancelEditBtn" onclick="exitHistoryEdit()" style="display:none">取消</button>
    </div>
  </div>

  <div class="history" id="history"></div>

  <div class="hp-editbar" id="hpEditBar" style="display:none">
    <button type="button" class="btn-soft" id="hpSelectAllBtn" onclick="selectAllVisibleHistory()">全选</button>
    <button type="button" class="btn-soft hp-edit-delete" id="hpDeleteBtn" onclick="showDeleteConfirmModal()" disabled>删除</button>
  </div>

  <footer>陪宝贝一起成长</footer>
 </div>

 <div id="settingsView" style="display:none">
  <div class="subpage-head">
    <button type="button" class="back-btn" onclick="switchView('home')">‹ 返回</button>
    <div class="subpage-title">我的</div>
  </div>
  <div class="profile-card">
    <div class="profile-avatar" id="setAvatar" onclick="openProfileModal()" title="点击修改头像">👧</div>
    <div class="profile-name" id="setName">宝贝</div>
    <button class="profile-edit" onclick="openProfileModal()"><img class="ui-ic" src="icons/edit.svg" alt="">修改头像和昵称</button>
  </div>

  <div id="settingsSection">
    <div class="section-title"><img class="ui-ic" src="icons/setting-two.svg" alt="">设置</div>
    <div class="menu-list">
      <div class="menu-item menu-item-static" id="vibrationSetting">
        <span class="menu-ic"><img class="ui-ic" src="icons/shake.svg" alt=""></span>
        <span class="menu-tx">
          <span class="menu-title">震动反馈</span>
          <span class="menu-desc">完成任务和兑换奖励时振动</span>
        </span>
        <label class="toggle-switch">
          <input type="checkbox" id="vibrationToggle" onchange="toggleVibration()">
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>
  </div>

  <div class="section-title"><img class="ui-ic" src="icons/setting-two.svg" alt="">功能</div>
  <div class="menu-list">
    <button type="button" class="menu-item" onclick="switchView('history')">
      <span class="menu-ic"><img class="ui-ic" src="icons/calendar.svg" alt=""></span>
      <span class="menu-tx">
        <span class="menu-title">记录</span>
        <span class="menu-desc" id="historyEntryDesc">查看与编辑积分记录</span>
      </span>
      <span class="menu-arrow">›</span>
    </button>
  </div>

  <div class="section-title"><img class="ui-ic" src="icons/lock.svg" alt="">账户</div>
  <div class="menu-list">
    <button type="button" class="menu-item" onclick="openPasswordModal()">
      <span class="menu-ic"><img class="ui-ic" src="icons/setting-two.svg" alt=""></span>
      <span class="menu-tx">
        <span class="menu-title">修改密码</span>
        <span class="menu-desc">更改当前账号的登录密码</span>
      </span>
      <span class="menu-arrow">›</span>
    </button>
    <button type="button" class="menu-item" onclick="logoutApp()">
      <span class="menu-ic"><img class="ui-ic" src="icons/lock.svg" alt=""></span>
      <span class="menu-tx">
        <span class="menu-title">退出登录</span>
        <span class="menu-desc">退出当前账号，返回登录界面</span>
      </span>
      <span class="menu-arrow">›</span>
    </button>
  </div>

  <div class="env-footer">
    <div class="app-meta" id="appMeta"></div>
  </div>
  <footer>陪宝贝一起成长</footer>
 </div>

</div>
</div>

<div class="modal-overlay" id="passwordModal" onclick="if(event.target===this) hidePasswordModal()">
  <div class="modal-box">
    <div class="modal-title">修改密码</div>
    <input class="profile-input modal-input" id="currentPasswordInput" type="password" autocomplete="current-password" placeholder="当前密码">
    <input class="profile-input modal-input" id="newPasswordInput" type="password" autocomplete="new-password" placeholder="新密码（至少 6 位）">
    <input class="profile-input modal-input" id="confirmPasswordInput" type="password" autocomplete="new-password" placeholder="确认新密码" onkeydown="if(event.key==='Enter')submitChangePassword()">
    <div class="modal-error" id="passwordModalError" style="display:none"></div>
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="hidePasswordModal()">取消</button>
      <button class="modal-btn confirm" id="passwordModalOk" onclick="submitChangePassword()">确认修改</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="profileModal" onclick="if(event.target===this) hideProfileModal()">
  <div class="modal-box">
    <div class="modal-title">修改宝贝信息</div>
    <input class="profile-input" id="profileNameInput" type="text" maxlength="12" placeholder="宝贝昵称" onkeydown="if(event.key==='Enter')saveProfile()">
    <div class="emoji-picker" id="emojiPicker"></div>
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="hideProfileModal()">取消</button>
      <button class="modal-btn confirm" onclick="saveProfile()">保存</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="calModal" onclick="if(event.target===this) hideCalendar()">
  <div class="modal-box cal-box">
    <div class="cal-head">
      <button class="cal-nav" onclick="calShift(-12)" title="上一年">«</button>
      <button class="cal-nav" onclick="calShift(-1)" title="上个月">‹</button>
      <div class="cal-title" id="calTitle"></div>
      <button class="cal-nav" onclick="calShift(1)" title="下个月">›</button>
      <button class="cal-nav" onclick="calShift(12)" title="下一年">»</button>
    </div>
    <div class="cal-week">
      <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
    </div>
    <div class="cal-grid" id="calGrid"></div>
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="hideCalendar()">取消</button>
      <button class="modal-btn confirm" onclick="calPickToday()">回到今天</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="spendModal" onclick="if(event.target===this) hideSpendModal()">
  <div class="modal-box">
    <div class="modal-emoji" id="spendModalEmoji"></div>
    <div class="modal-title">确定要兑换吗？</div>
    <div class="modal-msg" id="spendModalMsg"></div>
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="hideSpendModal()">取消</button>
      <button class="modal-btn confirm" onclick="confirmSpend()">确定兑换</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="deleteModal" onclick="if(event.target===this) hideDeleteConfirmModal()">
  <div class="modal-box">
    <div class="modal-emoji" id="deleteModalEmoji"><img class="ui-ic" src="icons/caution.svg" alt=""></div>
    <div class="modal-title">确定删除记录吗？</div>
    <div class="modal-msg" id="deleteModalMsg"></div>
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="hideDeleteConfirmModal()">取消</button>
      <button class="modal-btn danger" onclick="confirmDeleteSelected()">确认删除</button>
    </div>
  </div>
</div>

<!-- Firebase 云同步 SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="data.js"></script>
<script src="js/sync.js?v=0.0.45"></script>
<script src="js/history.js?v=0.0.45"></script>
<script src="js/ui.js?v=0.0.45"></script>
<script src="js/auth.js?v=0.0.45"></script>
</body>
</html>
