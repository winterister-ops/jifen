<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星星银行</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg1: #fff8ed;
    --card: #ffffff;
    --accent: #ff7b3d;
    --accent2: #ffc233;
    --green: #f0a202;
    --blue: #ffb627;
    --purple: #ff9f1c;
    --text: #6b4a2b;
    --shadow: 0 8px 24px rgba(200,140,60,.18);
  }
  body {
    font-family: "Comic Sans MS", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    background: var(--bg1);
    color: var(--text);
    min-height: 100vh;
    padding: 16px 16px calc(96px + env(safe-area-inset-bottom));
    overflow-x: hidden;
  }
  .wrap { max-width: 720px; margin: 0 auto; }

  /* 顶部栏 */
  .score-card {
    margin-bottom: 18px;
    padding: 4px 2px;
  }
  .header-row {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  .header-left {
    display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0;
  }
  .avatar {
    width: 52px; height: 52px; border-radius: 50%; flex-shrink: 0;
    background: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.85rem;
    border: 2px solid #ffe2bf;
    box-shadow: var(--shadow);
  }
  .welcome { min-width: 0; }
  .welcome .greet {
    font-size: 1.05rem; font-weight: 800; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .welcome .sub { font-size: .78rem; color: #b08a5e; margin-top: 3px; }
  .star-badge {
    display: flex; align-items: center; gap: 5px; flex-shrink: 0;
    background: var(--blue); color: #fff;
    padding: 8px 14px; border-radius: 999px;
    box-shadow: var(--shadow);
    transition: transform .25s;
  }
  .star-badge.bump { transform: scale(1.15); }
  .star-badge .star-icon { display: flex; align-items: center; line-height: 1; }
  .ui-ic {
    width: 1.25em; height: 1.25em; vertical-align: middle;
    display: inline-block; object-fit: contain; flex-shrink: 0;
  }
  .ui-ic-sm { width: .9em; height: .9em; vertical-align: -2px; }
  .nav-ic { display: flex; align-items: center; justify-content: center; }
  .nav-ic .ui-ic { width: 1.5rem; height: 1.5rem; }
  .tab .tab-ic { width: 1rem; height: 1rem; margin-right: 4px; vertical-align: -2px; }
  .cal-btn { display: flex; align-items: center; justify-content: center; font-size: 0; }
  .cal-btn .ui-ic { width: 1.35rem; height: 1.35rem; }
  .section-title .ui-ic { width: 1.15rem; height: 1.15rem; }
  .btn-soft, .profile-edit { display: inline-flex; align-items: center; justify-content: center; gap: 6px; }
  .btn-soft .ui-ic { width: 1.05rem; height: 1.05rem; }
  .profile-edit .ui-ic { width: 1.05rem; height: 1.05rem; }
  .star-badge .ui-ic { width: 1.35rem; height: 1.35rem; }
  footer {
    display: flex; align-items: center; justify-content: center; gap: 4px;
    text-align: center; color: #d2a679; font-size: .8rem; margin: 20px 0 8px;
  }
  .modal-emoji .ui-ic { width: 3rem; height: 3rem; }
  .empty { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .empty .ui-ic { width: 2.2rem; height: 2.2rem; opacity: .55; }
  .pop .pop-ic { width: 1.1em; height: 1.1em; vertical-align: -4px; margin-right: 2px; }
  .star-badge .score-num { font-size: 1.55rem; font-weight: 900; line-height: 1; }
  .env-badge {
    display: inline-block;
    font-size: .62rem; padding: 3px 10px; border-radius: 999px;
    background: rgba(120,110,160,.12); color: #a39fbb;
    font-weight: 600;
  }
  .env-badge.dev { background: rgba(255,209,102,.25); color: #b8860b; }
  .env-footer { text-align: center; margin: 4px 0 16px; }

  /* 标签切换 */
  .tabs { display: flex; gap: 8px; margin-bottom: 14px; }
  .tab {
    flex: 1; padding: 10px 8px; border: none; border-radius: 14px;
    font-size: .92rem; font-weight: 700; cursor: pointer;
    background: #fff; color: var(--text); box-shadow: var(--shadow);
    transition: transform .15s, background .2s;
    font-family: inherit;
  }
  .tab:active { transform: scale(.95); }
  .tab.active { color: #fff; }
  .tab.active.earn { background: var(--blue); }
  .tab.active.spend { background: var(--accent); }

  .sort-bar {
    margin-bottom: 12px;
    background: var(--card); border-radius: 14px;
    box-shadow: var(--shadow); overflow: hidden;
  }
  .sort-toggle {
    width: 100%; border: none; background: transparent; cursor: pointer;
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
    padding: 8px 12px; font-family: inherit;
  }
  .sort-toggle:active { opacity: .75; }
  .sort-label {
    font-size: .76rem; font-weight: 800; color: #b08a5e; flex-shrink: 0;
  }
  .sort-current {
    flex: 1; text-align: right; font-size: .72rem; font-weight: 700; color: #c9a882;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .sort-chevron {
    font-size: .7rem; color: #c9a882; transition: transform .2s; flex-shrink: 0;
  }
  .sort-bar.expanded .sort-chevron { transform: rotate(180deg); }
  .sort-options {
    display: none; gap: 6px; flex-wrap: wrap;
    padding: 0 12px 10px;
  }
  .sort-bar.expanded .sort-options { display: flex; }
  .sort-pill { font-size: .72rem; padding: 6px 10px; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 12px;
  }
  @media (max-width: 480px) { .grid { gap: 10px; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); } }

  .item {
    background: var(--card); border-radius: 22px; padding: 16px 12px;
    text-align: center; box-shadow: var(--shadow); cursor: pointer;
    transition: transform .12s; position: relative; user-select: none;
    border: 3px solid transparent;
  }
  .item:active { transform: scale(.93); }
  .item .emoji { font-size: 2.6rem; display: block; margin-bottom: 6px; }
  .item .name { font-size: 1.05rem; font-weight: 700; }
  .item .pts {
    position: absolute; top: 8px; right: 8px;
    padding: 4px 10px; border-radius: 999px;
    font-size: .75rem; font-weight: 800; color: #fff;
  }
  .earn-item .pts { background: var(--green); }
  .spend-item .pts { background: var(--accent); }
  .spend-item.locked { opacity: .45; filter: grayscale(.6); }

  /* 历史记录 */
  .section-title { font-size: 1.1rem; font-weight: 800; margin: 24px 0 12px; display: flex; align-items: center; gap: 8px; }
  .history { background: var(--card); border-radius: 22px; box-shadow: var(--shadow); padding: 8px; }
  .log {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 12px; border-radius: 14px;
  }
  .log:nth-child(odd) { background: #fff5e6; }
  .log .left { display: flex; align-items: center; gap: 10px; font-size: .95rem; }
  .log .le { font-size: 1.4rem; }
  .log .time { font-size: .72rem; color: #aaa; }
  .log .delta { font-weight: 800; font-size: 1rem; }
  .log .delta.plus { color: var(--green); }
  .log .delta.minus { color: var(--accent); }
  .empty { text-align: center; color: #bbb; padding: 24px; }

  /* 积分记录页面 */
  .hp-datebar {
    display: flex; align-items: flex-start; justify-content: space-between; gap: 10px;
    margin-bottom: 12px;
  }
  .hp-date-main { flex: 1; min-width: 0; }
  .hp-date-title {
    font-size: 1rem; font-weight: 800; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .hp-date-stats {
    font-size: .82rem; font-weight: 700; color: #b08a5e; margin-top: 4px;
  }
  .hp-date-stats .net.plus { color: var(--green); }
  .hp-date-stats .net.minus { color: var(--accent); }
  .hp-date-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .filter-pill {
    border: 2px solid #ffe2bf; background: #fff; color: var(--text);
    padding: 7px 12px; border-radius: 999px; font-family: inherit;
    font-size: .78rem; font-weight: 800; cursor: pointer; transition: transform .12s, background .2s, color .2s, border-color .2s;
  }
  .filter-pill:active { transform: scale(.92); }
  .filter-pill.active {
    background: var(--blue); color: #fff;
    border-color: transparent;
  }
  .filter-today { background: #fff0d6; border-color: #ffe2bf; }

  .cal-btn {
    flex: 0 0 auto; width: 48px; border: none; border-radius: 16px;
    background: var(--card); box-shadow: var(--shadow); cursor: pointer;
    font-size: 1.35rem; font-family: inherit; transition: transform .12s;
  }
  .cal-btn:active { transform: scale(.9); }
  .cal-btn-sm { width: 42px; font-size: 1.2rem; }

  /* 自定义日历 */
  .cal-box { max-width: 360px; }
  .cal-head { display: flex; align-items: center; gap: 6px; margin-bottom: 14px; }
  .cal-nav {
    border: none; background: #fff0d6; color: var(--text); border-radius: 12px;
    width: 38px; height: 38px; font-size: 1.05rem; font-weight: 800; cursor: pointer;
    font-family: inherit; flex: 0 0 auto; line-height: 1;
  }
  .cal-nav:active { transform: scale(.9); }
  .cal-title { flex: 1; text-align: center; font-size: 1.08rem; font-weight: 800; }
  .cal-week { display: grid; grid-template-columns: repeat(7, 1fr); margin-bottom: 6px; }
  .cal-week span { text-align: center; font-size: .78rem; font-weight: 700; color: #b08a5e; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .cal-cell {
    aspect-ratio: 1; border: none; background: transparent; border-radius: 12px;
    font-family: inherit; font-size: .95rem; font-weight: 700; color: var(--text);
    cursor: pointer; position: relative;
    display: flex; align-items: center; justify-content: center;
  }
  .cal-cell.blank { visibility: hidden; cursor: default; }
  .cal-cell:active { transform: scale(.9); }
  .cal-cell .dot {
    position: absolute; bottom: 5px; left: 50%; transform: translateX(-50%);
    width: 5px; height: 5px; border-radius: 50%; background: var(--accent);
  }
  .cal-cell.today { box-shadow: inset 0 0 0 2px var(--accent2); }
  .cal-cell.sel {
    background: var(--blue); color: #fff;
  }
  .cal-cell.sel .dot { background: #fff; }

  .date-head {
    font-size: .82rem; font-weight: 800; color: #b0772f;
    padding: 12px 12px 4px;
  }

  .toolbar { display: flex; gap: 10px; margin-top: 14px; }
  .btn-soft {
    flex: 1; padding: 12px; border: none; border-radius: 16px; cursor: pointer;
    background: #fff; color: var(--text); font-weight: 700; font-family: inherit;
    box-shadow: var(--shadow); font-size: .9rem;
  }
  .btn-soft:active { transform: scale(.96); }

  /* 飘出的积分提示 */
  .pop {
    position: fixed; left: 50%; top: 30%; transform: translateX(-50%);
    font-size: 3rem; font-weight: 900; pointer-events: none; z-index: 50;
    animation: popUp 1s ease-out forwards;
  }
  @keyframes popUp {
    0% { opacity: 0; transform: translateX(-50%) scale(.4); }
    25% { opacity: 1; transform: translateX(-50%) scale(1.3) translateY(-10px); }
    100% { opacity: 0; transform: translateX(-50%) scale(1) translateY(-90px); }
  }
  .confetti {
    position: fixed; width: 12px; height: 12px; z-index: 49; pointer-events: none;
    border-radius: 3px; top: -20px;
  }
  @keyframes fall {
    to { transform: translateY(105vh) rotate(720deg); opacity: 0; }
  }
  footer .ui-ic { width: .95rem; height: .95rem; }

  /* 确认弹窗 */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(74, 74, 106, .45);
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    opacity: 0; visibility: hidden;
    transition: opacity .2s, visibility .2s;
  }
  .modal-overlay.show { opacity: 1; visibility: visible; }
  #clearModal { z-index: 110; }
  .modal-box {
    background: #fff; border-radius: 28px; padding: 28px 24px;
    max-width: 340px; width: 100%; text-align: center;
    box-shadow: 0 16px 48px rgba(120,110,160,.25);
    transform: scale(.9); transition: transform .2s;
  }
  .modal-overlay.show .modal-box { transform: scale(1); }
  .modal-emoji { font-size: 3rem; margin-bottom: 12px; }
  .modal-title { font-size: 1.15rem; font-weight: 800; margin-bottom: 10px; }
  .modal-msg { font-size: .95rem; color: #888; line-height: 1.5; margin-bottom: 8px; }
  .modal-step {
    font-size: .78rem; color: var(--purple); font-weight: 700;
    margin-bottom: 20px;
  }
  .modal-btns { display: flex; gap: 10px; }
  .modal-btn {
    flex: 1; padding: 14px; border: none; border-radius: 16px;
    font-size: .95rem; font-weight: 700; cursor: pointer; font-family: inherit;
    transition: transform .12s;
  }
  .modal-btn:active { transform: scale(.96); }
  .modal-btn.cancel { background: #fff0d6; color: var(--text); }
  .modal-btn.confirm { background: var(--accent); color: #fff; }
  .modal-btn.danger { background: #e63956; color: #fff; }

  .profile-input {
    width: 100%; padding: 12px 14px; border: 2px solid #ffe2bf;
    border-radius: 14px; font-size: 1rem; font-family: inherit;
    color: var(--text); margin-bottom: 14px; outline: none;
    text-align: center; font-weight: 700;
  }
  .profile-input:focus { border-color: var(--purple); }
  .emoji-picker {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
    margin-bottom: 20px;
  }
  .emoji-opt {
    aspect-ratio: 1; border: 2px solid #ffe2bf; border-radius: 14px;
    background: #fff7ec; font-size: 1.6rem; cursor: pointer;
    font-family: inherit; transition: transform .12s, border-color .12s;
  }
  .emoji-opt:active { transform: scale(.92); }
  .emoji-opt.selected {
    border-color: var(--purple); background: #fff0d6;
    box-shadow: 0 0 0 2px rgba(255,159,28,.35);
  }

  /* 底部导航栏 */
  .bottom-nav {
    position: fixed; left: 50%; transform: translateX(-50%);
    bottom: calc(12px + env(safe-area-inset-bottom));
    width: calc(100% - 32px); max-width: 720px; z-index: 80;
    display: flex; justify-content: center;
    background: rgba(255,255,255,.95);
    backdrop-filter: blur(12px);
    border-radius: 24px;
    border: 1px solid rgba(255,226,191,.85);
    box-shadow: 0 4px 20px rgba(200,140,60,.18), 0 8px 32px rgba(107,74,43,.08);
    padding: 8px 12px;
  }
  .nav-inner {
    width: 100%; max-width: 720px; display: flex; gap: 6px;
  }
  .nav-item {
    flex: 1; border: none; background: transparent; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    padding: 7px 4px; border-radius: 16px; font-family: inherit;
    color: #c0a584; transition: transform .12s, background .2s, color .2s;
  }
  .nav-item .nav-ic { line-height: 1; transition: transform .2s; }
  .nav-item .nav-tx { font-size: .74rem; font-weight: 800; }
  .nav-item:active { transform: scale(.9); }
  .nav-item.active { color: var(--accent); background: #fff3e0; }
  .nav-item.active .nav-ic { transform: scale(1.15) translateY(-1px); }

  /* 我的 / 设置页 */
  .profile-card {
    background: var(--blue);
    border-radius: 28px; padding: 26px 20px; color: #fff;
    box-shadow: var(--shadow); text-align: center; margin-bottom: 16px;
  }
  .profile-avatar {
    width: 84px; height: 84px; border-radius: 50%; margin: 0 auto 12px;
    background: rgba(255,255,255,.3); border: 3px solid rgba(255,255,255,.55);
    display: flex; align-items: center; justify-content: center;
    font-size: 3rem; cursor: pointer; transition: transform .15s;
    box-shadow: 0 6px 16px rgba(0,0,0,.12);
  }
  .profile-avatar:active { transform: scale(.92); }
  .profile-name {
    font-size: 1.35rem; font-weight: 900;
    text-shadow: 0 2px 4px rgba(0,0,0,.12);
  }
  .profile-edit {
    margin-top: 16px; border: none; cursor: pointer; font-family: inherit;
    background: rgba(255,255,255,.92); color: var(--accent);
    font-size: .98rem; font-weight: 800; padding: 12px 22px; border-radius: 16px;
    transition: transform .12s;
  }
  .profile-edit:active { transform: scale(.96); }

  .stat-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .stat-box {
    background: var(--card); border-radius: 20px; padding: 16px 8px;
    text-align: center; box-shadow: var(--shadow);
  }
  .stat-num { font-size: 1.4rem; font-weight: 900; }
  .stat-num.plus { color: var(--green); }
  .stat-num.minus { color: var(--accent); }
  .stat-lb { font-size: .76rem; font-weight: 700; color: #b08a5e; margin-top: 4px; }

  .task-stats {
    background: var(--card); border-radius: 22px; box-shadow: var(--shadow);
    padding: 8px; margin-bottom: 8px;
  }
  .task-stat-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 12px; border-radius: 14px;
  }
  .task-stat-list .task-stat-row:nth-child(odd) { background: #fff5e6; }
  .task-stat-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .task-stat-emoji { font-size: 1.4rem; flex-shrink: 0; }
  .task-stat-name {
    font-size: .95rem; font-weight: 700;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .task-stat-count {
    flex-shrink: 0; background: var(--purple); color: #fff;
    font-size: .78rem; font-weight: 800; min-width: 28px; height: 28px;
    border-radius: 999px; display: flex; align-items: center; justify-content: center;
    padding: 0 8px;
  }
  .task-stats .empty { padding: 20px; }

  .menu-list {
    display: flex; flex-direction: column; gap: 10px; margin-bottom: 8px;
  }
  .menu-item {
    width: 100%; border: none; background: var(--card); border-radius: 20px;
    box-shadow: var(--shadow); padding: 14px 16px; cursor: pointer;
    display: flex; align-items: center; gap: 12px; font-family: inherit;
    text-align: left; transition: transform .12s;
  }
  .menu-item:active { transform: scale(.97); }
  .menu-ic {
    width: 42px; height: 42px; border-radius: 14px; background: #fff3e0;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .menu-ic .ui-ic { width: 1.25rem; height: 1.25rem; }
  .menu-tx { flex: 1; min-width: 0; }
  .menu-title { display: block; font-size: 1rem; font-weight: 800; color: var(--text); }
  .menu-desc { display: block; font-size: .76rem; font-weight: 700; color: #b08a5e; margin-top: 3px; }
  .menu-arrow { font-size: 1.35rem; font-weight: 800; color: #d2a679; flex-shrink: 0; }

  .subpage-head {
    display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
  }
  .back-btn {
    border: none; background: var(--card); color: var(--text);
    padding: 10px 14px; border-radius: 14px; font-family: inherit;
    font-size: .9rem; font-weight: 800; cursor: pointer; box-shadow: var(--shadow);
    transition: transform .12s; flex-shrink: 0;
  }
  .back-btn:active { transform: scale(.94); }
  .subpage-title { font-size: 1.15rem; font-weight: 900; }
</style>
</head>
<body>
<div class="wrap">
 <div id="mainView">
  <div class="score-card">
    <div class="header-row">
      <div class="header-left">
        <div class="avatar" id="avatar">👧</div>
        <div class="welcome">
          <div class="greet" id="welcomeGreet">你好，宝贝！</div>
          <div class="sub" id="welcomeSub">星星银行</div>
        </div>
      </div>
      <div class="star-badge" id="starBadge">
        <span class="star-icon"><img class="ui-ic" src="icons/star.svg" alt=""></span>
        <span class="score-num" id="scoreNum">0</span>
      </div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab earn active" id="tabEarn" onclick="switchTab('earn')"><img class="ui-ic tab-ic" src="icons/muscle.svg" alt="">完成任务</button>
    <button class="tab spend" id="tabSpend" onclick="switchTab('spend')"><img class="ui-ic tab-ic" src="icons/gift.svg" alt="">兑换奖励</button>
  </div>

  <div class="sort-bar" id="sortBar">
    <button type="button" class="sort-toggle" onclick="toggleSortBar()">
      <span class="sort-label">排序</span>
      <span class="sort-current" id="sortCurrent">默认</span>
      <span class="sort-chevron">▼</span>
    </button>
    <div class="sort-options" id="sortOptions">
      <button type="button" class="filter-pill sort-pill" data-sort="default" onclick="setTaskSort('default')">默认</button>
      <button type="button" class="filter-pill sort-pill" data-sort="pts-asc" onclick="setTaskSort('pts-asc')">分数从低到高</button>
      <button type="button" class="filter-pill sort-pill" data-sort="pts-desc" onclick="setTaskSort('pts-desc')">分数从高到低</button>
    </div>
  </div>

  <div class="grid" id="grid"></div>

  <footer>陪宝贝一起成长</footer>
 </div>

 <div id="historyView" style="display:none">
  <div class="hp-datebar">
    <div class="hp-date-main">
      <div class="hp-date-title" id="hpDateTitle">今天</div>

<!-- Firebase 云同步 SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
  // ====== 宝贝信息默认值（首次使用或未设置时） ======
  const DEFAULT_CHILD_NAME = '宝贝';
  const DEFAULT_CHILD_AVATAR = '👧';
  // 头像：0-12 岁男孩女孩 + 十二生肖
  const AVATAR_OPTIONS = [
    '👶', '👦', '👧', '🧒',
    '🐭', '🐮', '🐯', '🐰', '🐲', '🐍', '🐴', '🐑', '🐵', '🐔', '🐶', '🐷'
  ];
  let profilePickAvatar = DEFAULT_CHILD_AVATAR;

  function ipIcon(name, cls = 'ui-ic') {
    return `<img class="${cls}" src="icons/${name}.svg" alt="">`;
  }

  function defaultProfile() {
    return { name: DEFAULT_CHILD_NAME, avatar: DEFAULT_CHILD_AVATAR };
  }

  function normalizeProfile(p) {
    if (p && typeof p.name === 'string' && p.name.trim()) {
      return {
        name: p.name.trim().slice(0, 12),
        avatar: AVATAR_OPTIONS.includes(p.avatar) ? p.avatar : DEFAULT_CHILD_AVATAR
      };
    }
    return defaultProfile();
  }

  // ====== 可自由修改的任务和奖励 ======
  const TASKS = [
    { id: 'wash',    emoji: '🧼', name: '自己洗手',   pts: 2 },
    { id: 'eat',     emoji: '🍚', name: '自己吃饭',   pts: 5 },
    { id: 'veggie',  emoji: '🥬', name: '吃蔬菜',     pts: 4 },
    { id: 'brush',   emoji: '🪥', name: '认真刷牙',   pts: 3 },
    { id: 'dress',   emoji: '👕', name: '自己穿衣服', pts: 5 },
    { id: 'shoes',   emoji: '👟', name: '自己穿鞋',   pts: 3 },
    { id: 'tidy',    emoji: '🧸', name: '收拾玩具',   pts: 4 },
    { id: 'sleep',   emoji: '😴', name: '乖乖睡觉',   pts: 4 },
    { id: 'jump',    emoji: '🤽', name: '勇敢跳水',   pts: 10 },
    { id: 'dive',    emoji: '🌊', name: '勇敢潜水',   pts: 10 },
    { id: 'learn',   emoji: '📚', name: '认真学习',   pts: 5 },
  ];
  const REWARDS = [
    { id: 'cartoon', emoji: '📺', name: '看动画片15分钟', pts: 10 },
    { id: 'snack',   emoji: '🍪', name: '小零食一份',     pts: 8 },
    { id: 'icecream',emoji: '🍦', name: '冰淇淋一个',     pts: 15 },
    { id: 'toy',     emoji: '🚗', name: '小玩具一个',     pts: 30 },
    { id: 'park',    emoji: '🎡', name: '去游乐场玩',     pts: 50 },
  ];

  // ====== 环境隔离：本地开发 vs 线上真实 ======
  // localhost / 127.0.0.1 / 直接打开本地文件 → 开发环境
  // 部署到 GitHub Pages 等线上域名 → 线上环境
  const IS_LOCAL = ['localhost', '127.0.0.1'].includes(location.hostname)
    || location.protocol === 'file:';
  const ENV = IS_LOCAL ? 'dev' : 'prod';

  // 线上 Firebase 配置（真实积分，勿在本地乱测时可忽略此项）
  const firebaseConfigProd = {
    apiKey: "AIzaSyBSfzrKexHnCDOQ3k8vTSJ8oGqRtlh95tk",
    authDomain: "baby-points-9a82c.firebaseapp.com",
    databaseURL: "https://baby-points-9a82c-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "baby-points-9a82c",
    storageBucket: "baby-points-9a82c.firebasestorage.app",
    messagingSenderId: "524651272617",
    appId: "1:524651272617:web:b827922fafbc5e083c4cb8"
  };
  // 开发 Firebase 配置（可选：创建独立 dev 项目后粘贴；留空则复用线上项目但走独立数据路径）
  const firebaseConfigDev = {
    apiKey: "",
    authDomain: "",
    databaseURL: "",
    projectId: "",
    storageBucket: "",
    messagingSenderId: "",
    appId: ""
  };

  const firebaseConfig = (ENV === 'dev' && firebaseConfigDev.databaseURL)
    ? firebaseConfigDev
    : firebaseConfigProd;

  // 家庭代号：dev / prod 各一份，互不影响
  const FAMILY = ENV === 'dev' ? 'mybaby-dev' : 'mybaby';

  // ====== 数据存储 ======
  const KEY = 'kid_points_data_v1_' + ENV;
  const SORT_KEY = 'kid_points_sort_v1_' + ENV;
  const SORT_MODES = ['default', 'pts-asc', 'pts-desc'];
  const SORT_LABELS = { default: '默认', 'pts-asc': '分数从低到高', 'pts-desc': '分数从高到低' };
  let taskSort = SORT_MODES.includes(localStorage.getItem(SORT_KEY))
    ? localStorage.getItem(SORT_KEY) : 'default';
  let sortBarExpanded = false;
  let state = loadLocal();
  let cloudRef = null;
  let applyingRemote = false;

  function loadLocal() {
    try {
      const d = JSON.parse(localStorage.getItem(KEY));
      if (d && typeof d.score === 'number') {
        if (!Array.isArray(d.history)) d.history = [];
        d.profile = normalizeProfile(d.profile);
        return d;
      }
    } catch(e){}
    return { score: 0, history: [], profile: defaultProfile() };
  }
  function saveLocal() { localStorage.setItem(KEY, JSON.stringify(state)); }

  function save() {
    saveLocal();
    if (cloudRef && !applyingRemote) {
      cloudRef.set(state).catch(err => console.warn('云同步写入失败', err));
    }
  }

  function welcomeText() {
    const name = state.profile.name;
    const h = new Date().getHours();
    if (h < 12) return '早上好，' + name + '！';
    if (h < 18) return '下午好，' + name + '！';
    return '晚上好，' + name + '！';
  }

  function renderHeader() {
    document.getElementById('scoreNum').textContent = state.score;
    document.getElementById('welcomeGreet').textContent = welcomeText();
    document.getElementById('avatar').textContent = state.profile.avatar;
  }

  function renderEmojiPicker() {
    const grid = document.getElementById('emojiPicker');
    grid.innerHTML = '';
    AVATAR_OPTIONS.forEach(em => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'emoji-opt' + (em === profilePickAvatar ? ' selected' : '');
      btn.textContent = em;
      btn.onclick = () => { profilePickAvatar = em; renderEmojiPicker(); };
      grid.appendChild(btn);
    });
  }

  function openProfileModal() {
    profilePickAvatar = state.profile.avatar;
    document.getElementById('profileNameInput').value = state.profile.name;
    renderEmojiPicker();
    document.getElementById('profileModal').classList.add('show');
    setTimeout(() => document.getElementById('profileNameInput').focus(), 200);
  }

  function hideProfileModal() {
    document.getElementById('profileModal').classList.remove('show');
  }

  // ====== 积分记录页面 + 日期筛选 ======
  let selectedDateKey = ymd(new Date()); // 'YYYY-MM-DD' 或 'all'

  function ymd(d) {
    const p = n => String(n).padStart(2, '0');
    return d.getFullYear() + '-' + p(d.getMonth() + 1) + '-' + p(d.getDate());
  }

  // 旧记录可能没有 ts，尽量从 "M月D日 HH:MM" 解析（按当前年份）
  function entryDate(log) {
    if (typeof log.ts === 'number') return new Date(log.ts);
    const m = /(\d+)月(\d+)日\s+(\d+):(\d+)/.exec(log.time || '');
    if (m) {
      const now = new Date();
      return new Date(now.getFullYear(), +m[1] - 1, +m[2], +m[3], +m[4]);
    }
    return null;
  }
  function entryDateKey(log) {
    const d = entryDate(log);
    return d ? ymd(d) : 'unknown';
  }

  const WEEKDAYS = ['周日','周一','周二','周三','周四','周五','周六'];
  function dateHeadLabel(key) {
    if (key === 'all') return '全部记录';
    if (key === 'unknown') return '更早的记录';
    const [y, mo, da] = key.split('-').map(Number);
    const d = new Date(y, mo - 1, da);
    const today = ymd(new Date());
    const yest = ymd(new Date(Date.now() - 86400000));
    const curYear = new Date().getFullYear();
    let prefix = key === today ? '今天 · ' : (key === yest ? '昨天 · ' : '');
    const yearPart = y !== curYear ? `${y}年` : '';
    return prefix + `${yearPart}${mo}月${da}日 ${WEEKDAYS[d.getDay()]}`;
  }

  function buildStats(list) {
    if (!list.length) return '暂无记录';
    const net = list.reduce((s, x) => s + x.delta, 0);
    const cls = net >= 0 ? 'plus' : 'minus';
    const sign = net > 0 ? '+' : '';
    return `共 ${list.length} 条 · 净 <span class="net ${cls}">${sign}${net}</span> ${ipIcon('star', 'ui-ic-sm')}`;
  }

  function filteredHistory() {
    let list = state.history.slice();
    if (selectedDateKey !== 'all') list = list.filter(log => entryDateKey(log) === selectedDateKey);
    return list;
  }

  function renderDateHeader() {
    const titleEl = document.getElementById('hpDateTitle');
    const statsEl = document.getElementById('hpDateStats');
    const allBtn = document.getElementById('allToggle');
    const todayBtn = document.getElementById('todayBtn');
    if (!titleEl) return;

    const list = filteredHistory();
    const showAll = selectedDateKey === 'all';
    titleEl.textContent = showAll ? '全部记录' : dateHeadLabel(selectedDateKey);
    if (statsEl) statsEl.innerHTML = buildStats(list);
    if (allBtn) allBtn.classList.toggle('active', showAll);

    const todayKey = ymd(new Date());
    if (todayBtn) todayBtn.style.display = (selectedDateKey !== todayKey && selectedDateKey !== 'all') ? '' : 'none';
  }

  function selectDate(key) {
    selectedDateKey = key;
    renderDateHeader();
    renderHistory();
  }

  function toggleAllFilter() {
    selectDate(selectedDateKey === 'all' ? ymd(new Date()) : 'all');
  }

  function goToToday() {
    selectDate(ymd(new Date()));
  }

  // ====== 自定义日历选择器 ======
  let calYear, calMonth; // calMonth: 0-11

  function openCalendar() {
    let base;
    if (selectedDateKey !== 'all' && selectedDateKey !== 'unknown') {
      const [y, m] = selectedDateKey.split('-').map(Number);
      base = new Date(y, m - 1, 1);
    } else {
      base = new Date();
    }
    calYear = base.getFullYear();
    calMonth = base.getMonth();
    renderCalendar();
    document.getElementById('calModal').classList.add('show');
  }
  function hideCalendar() {
    document.getElementById('calModal').classList.remove('show');
  }
  function calShift(deltaMonths) {
    const d = new Date(calYear, calMonth + deltaMonths, 1);
    calYear = d.getFullYear();
    calMonth = d.getMonth();
    renderCalendar();
  }
  function calSelect(key) {
    hideCalendar();
    selectDate(key);
  }
  function calPickToday() {
    calSelect(ymd(new Date()));
  }
  function renderCalendar() {
    document.getElementById('calTitle').textContent = `${calYear}年${calMonth + 1}月`;
    const grid = document.getElementById('calGrid');
    grid.innerHTML = '';
    const startDow = new Date(calYear, calMonth, 1).getDay();
    const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
    const todayKey = ymd(new Date());
    const recDays = new Set(state.history.map(entryDateKey));

    for (let i = 0; i < startDow; i++) {
      const b = document.createElement('div');
      b.className = 'cal-cell blank';
      grid.appendChild(b);
    }
    for (let day = 1; day <= daysInMonth; day++) {
      const key = ymd(new Date(calYear, calMonth, day));
      const cell = document.createElement('button');
      cell.type = 'button';
      cell.className = 'cal-cell'
        + (key === todayKey ? ' today' : '')
        + (key === selectedDateKey ? ' sel' : '');
      cell.innerHTML = day + (recDays.has(key) ? '<i class="dot"></i>' : '');
      cell.onclick = () => calSelect(key);
      grid.appendChild(cell);
    }
  }

  let currentView = 'home';
  const VIEW_IDS = { home: 'mainView', history: 'historyView', settings: 'settingsView', stats: 'statsView' };

  function switchView(view) {
    currentView = view;
    Object.keys(VIEW_IDS).forEach(v => {
      document.getElementById(VIEW_IDS[v]).style.display = v === view ? '' : 'none';
    });
    document.getElementById('navHome').classList.toggle('active', view === 'home');
    document.getElementById('navHistory').classList.toggle('active', view === 'history');
    document.getElementById('navSettings').classList.toggle('active', view === 'settings' || view === 'stats');
    if (view === 'history') {
      selectedDateKey = ymd(new Date());
      renderDateHeader();
      renderHistory();
    }
    if (view === 'settings') renderSettings();
    if (view === 'stats') renderTaskStats();
    window.scrollTo(0, 0);
  }

  function renderSettings() {
    document.getElementById('setAvatar').textContent = state.profile.avatar;
    document.getElementById('setName').textContent = state.profile.name;
    document.getElementById('setScore').textContent = state.score;
    let earned = 0, spent = 0;
    state.history.forEach(h => { if (h.delta > 0) earned += h.delta; else spent += -h.delta; });
    document.getElementById('setEarned').textContent = '+' + earned;
    document.getElementById('setSpent').textContent = '-' + spent;
    const totalCount = state.history.length;
    const descEl = document.getElementById('statsEntryDesc');
    if (descEl) {
      descEl.textContent = totalCount ? `共 ${totalCount} 条完成记录` : '查看完成记录';
    }
  }

  function renderTaskStats() {
    const el = document.getElementById('taskStats');
    if (!el) return;
    const earnStats = TASKS.map(t => ({ ...t, count: countOf(t.id) })).filter(t => t.count > 0);
    const rewardStats = REWARDS.map(t => ({ ...t, count: countOf(t.id) })).filter(t => t.count > 0);
    if (!earnStats.length && !rewardStats.length) {
      el.innerHTML = '<div class="empty">还没有完成记录</div>';
      return;
    }
    let html = '';
    if (earnStats.length) {
      html += '<div class="date-head">完成任务</div><div class="task-stat-list">';
      earnStats.forEach(t => {
        html += `<div class="task-stat-row">
          <div class="task-stat-left"><span class="task-stat-emoji">${t.emoji}</span><span class="task-stat-name">${t.name}</span></div>
          <span class="task-stat-count">${t.count}次</span>
        </div>`;
      });
      html += '</div>';
    }
    if (rewardStats.length) {
      html += '<div class="date-head">兑换奖励</div><div class="task-stat-list">';
      rewardStats.forEach(t => {
        html += `<div class="task-stat-row">
          <div class="task-stat-left"><span class="task-stat-emoji">${t.emoji}</span><span class="task-stat-name">${t.name}</span></div>
          <span class="task-stat-count">${t.count}次</span>
        </div>`;
      });
      html += '</div>';
    }
    el.innerHTML = html;
  }

  function saveProfile() {
    const name = document.getElementById('profileNameInput').value.trim();
    if (!name) {
      popup('请输入昵称', '#ff8fab', 'edit', true);
      return;
    }
    state.profile = { name: name.slice(0, 12), avatar: profilePickAvatar };
    save();
    renderHeader();
    renderSettings();
    hideProfileModal();
  }

  function setStatus(text, isDev) {
    const el = document.getElementById('envBadge');
    if (!el) return;
    el.textContent = text;
    el.classList.toggle('dev', !!isDev);
  }

  function envStatusText() {
    if (ENV === 'prod') return { text: '线上', dev: false };
    return { text: '开发', dev: true };
  }

  function initCloud() {
    if (!firebaseConfig.databaseURL) {
      const s = envStatusText();
      setStatus(s.text, s.dev);
      return;
    }
    try {
      firebase.initializeApp(firebaseConfig);
      cloudRef = firebase.database().ref('families/' + FAMILY);
      let first = true;
      cloudRef.on('value', snap => {
        const val = snap.val();
        if (val && typeof val.score === 'number') {
          state = {
            score: val.score,
            history: Array.isArray(val.history) ? val.history : [],
            profile: normalizeProfile(val.profile)
          };
          saveLocal();
          applyingRemote = true; render(); applyingRemote = false;
        } else if (first) {
          cloudRef.set(state); // 云端为空时，把本机数据作为初始上传
        }
        first = false;
        const s = envStatusText();
        setStatus(s.text, s.dev);
      }, err => { console.warn(err); setStatus('离线', ENV === 'dev'); });
    } catch(e) { console.warn(e); setStatus('离线', ENV === 'dev'); }
  }

  let currentTab = 'earn';

  function switchTab(t) {
    currentTab = t;
    document.getElementById('tabEarn').classList.toggle('active', t === 'earn');
    document.getElementById('tabSpend').classList.toggle('active', t === 'spend');
    render();
  }

  function toggleSortBar() {
    sortBarExpanded = !sortBarExpanded;
    document.getElementById('sortBar').classList.toggle('expanded', sortBarExpanded);
  }

  function setTaskSort(mode) {
    if (!SORT_MODES.includes(mode)) return;
    taskSort = mode;
    localStorage.setItem(SORT_KEY, mode);
    renderSortBar();
    render();
  }

  function renderSortBar() {
    document.querySelectorAll('.sort-pill').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.sort === taskSort);
    });
    const cur = document.getElementById('sortCurrent');
    if (cur) cur.textContent = SORT_LABELS[taskSort] || '默认';
    document.getElementById('sortBar').classList.toggle('expanded', sortBarExpanded);
  }

  function sortItems(list) {
    const items = list.slice();
    switch (taskSort) {
      case 'pts-asc':
        return items.sort((a, b) => a.pts - b.pts || a.name.localeCompare(b.name, 'zh-CN'));
      case 'pts-desc':
        return items.sort((a, b) => b.pts - a.pts || a.name.localeCompare(b.name, 'zh-CN'));
      default:
        return items;
    }
  }

  function countOf(id) {
    return state.history.filter(h => h.id === id).length;
  }

  function render() {
    renderHeader();
    renderSortBar();
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    const list = sortItems(currentTab === 'earn' ? TASKS : REWARDS);
    list.forEach(it => {
      const div = document.createElement('div');
      if (currentTab === 'earn') {
        div.className = 'item earn-item';
        div.innerHTML = `
          <span class="pts">+${it.pts}</span>
          <span class="emoji">${it.emoji}</span>
          <span class="name">${it.name}</span>`;
        div.onclick = (e) => earn(it, e);
      } else {
        const locked = state.score < it.pts;
        div.className = 'item spend-item' + (locked ? ' locked' : '');
        div.innerHTML = `
          <span class="pts">-${it.pts}</span>
          <span class="emoji">${it.emoji}</span>
          <span class="name">${it.name}</span>`;
        div.onclick = (e) => spend(it, e, locked);
      }
      grid.appendChild(div);
    });
    renderSettings();
    if (currentView === 'stats') renderTaskStats();
    renderHistory();
  }

  function renderHistory() {
    const h = document.getElementById('history');
    if (!h) return;
    renderDateHeader();

    let list = filteredHistory();
    const showAll = selectedDateKey === 'all';

    if (!list.length) {
      h.innerHTML = showAll
        ? `<div class="empty">${ipIcon('rocket')}还没有记录，快去做任务赚积分吧！</div>`
        : `<div class="empty">${ipIcon('inbox')}这一天还没有积分记录哦</div>`;
      return;
    }

    h.innerHTML = '';
    let lastKey = null;
    list.slice().reverse().forEach(log => {
      const key = entryDateKey(log);
      if (showAll && key !== lastKey) {
        lastKey = key;
        const head = document.createElement('div');
        head.className = 'date-head';
        head.textContent = dateHeadLabel(key);
        h.appendChild(head);
      }
      const row = document.createElement('div');
      row.className = 'log';
      const plus = log.delta > 0;
      row.innerHTML = `
        <div class="left">
          <span class="le">${log.emoji}</span>
          <div>
            <div>${log.name}</div>
            <div class="time">${log.time}</div>
          </div>
        </div>
        <div class="delta ${plus ? 'plus' : 'minus'}">${plus ? '+' : ''}${log.delta}</div>`;
      h.appendChild(row);
    });
  }

  function nowStr() {
    const d = new Date();
    const p = n => String(n).padStart(2, '0');
    return `${d.getMonth()+1}月${d.getDate()}日 ${p(d.getHours())}:${p(d.getMinutes())}`;
  }

  function earn(it, e) {
    state.score += it.pts;
    state.history.push({ id: it.id, emoji: it.emoji, name: it.name, delta: it.pts, time: nowStr(), ts: Date.now() });
    save();
    bump(); popup('+' + it.pts, '#06d6a0', it.emoji); confetti();
    render();
  }

  function spend(it, e, locked) {
    if (locked) {
      popup('积分不够哦', '#ff8fab', 'caution', true);
      shakeScore();
      return;
    }
    state.score -= it.pts;
    state.history.push({ id: it.id, emoji: it.emoji, name: it.name, delta: -it.pts, time: nowStr(), ts: Date.now() });
    save();
    bump(); popup('-' + it.pts, '#ff8fab', it.emoji);
    render();
  }

  function undoLast() {
    if (!state.history.length) return;
    const last = state.history.pop();
    state.score -= last.delta;
    save();
    render();
  }

  let clearConfirmStep = 1;

  const CLEAR_STEPS = [
    {
      icon: 'clear-format',
      title: '确定要清空吗？',
      msg: '将清空当前所有积分和记录。',
      step: '第 1 步 / 共 2 步',
      btn: '继续',
      danger: false
    },
    {
      icon: 'caution',
      title: '再次确认清空',
      msg: '清空后无法恢复，真的要全部清空吗？',
      step: '第 2 步 / 共 2 步',
      btn: '确认全部清空',
      danger: true
    }
  ];

  function showClearModalStep(step) {
    clearConfirmStep = step;
    const s = CLEAR_STEPS[step - 1];
    document.getElementById('clearModalEmoji').innerHTML = ipIcon(s.icon);
    document.getElementById('clearModalTitle').textContent = s.title;
    document.getElementById('clearModalMsg').textContent = s.msg;
    document.getElementById('clearModalStep').textContent = s.step;
    const okBtn = document.getElementById('clearModalOk');
    okBtn.textContent = s.btn;
    okBtn.className = 'modal-btn ' + (s.danger ? 'danger' : 'confirm');
    document.getElementById('clearModal').classList.add('show');
  }

  function hideClearModal() {
    document.getElementById('clearModal').classList.remove('show');
    clearConfirmStep = 1;
  }

  function clearAll() {
    if (!state.score && !state.history.length) return;
    showClearModalStep(1);
  }

  function onClearConfirm() {
    if (clearConfirmStep === 1) {
      showClearModalStep(2);
      return;
    }
    state = { score: 0, history: [], profile: state.profile };
    save();
    render();
    hideClearModal();
  }

  // ====== 动画效果 ======
  function bump() {
    const el = document.getElementById('starBadge');
    el.classList.remove('bump'); void el.offsetWidth; el.classList.add('bump');
    setTimeout(() => el.classList.remove('bump'), 300);
  }
  function shakeScore() {
    const el = document.getElementById('starBadge');
    el.animate([{transform:'scale(1)'},{transform:'scale(1.1) translateX(-4px)'},{transform:'scale(1.1) translateX(4px)'},{transform:'scale(1)'}],{duration:300});
  }
  function popup(text, color, visual, asIcon) {
    const p = document.createElement('div');
    p.className = 'pop';
    p.style.color = color;
    const prefix = asIcon ? ipIcon(visual, 'pop-ic') : ((visual || '') + ' ');
    p.innerHTML = prefix + text;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 1000);
  }
  function confetti() {
    const colors = ['#ff7b3d','#ffc233','#ffb627','#ff9a3c','#ff5e62'];
    for (let i = 0; i < 24; i++) {
      const c = document.createElement('div');
      c.className = 'confetti';
      c.style.left = Math.random()*100 + 'vw';
      c.style.background = colors[Math.floor(Math.random()*colors.length)];
      const dur = 1.2 + Math.random()*1;
      c.style.animation = `fall ${dur}s linear forwards`;
      c.style.transform = `rotate(${Math.random()*360}deg)`;
      document.body.appendChild(c);
      setTimeout(() => c.remove(), dur*1000 + 100);
    }
  }

  render();
  { const s = envStatusText(); setStatus(s.text, s.dev); }
  initCloud();
</script>
</body>
</html>
